<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵枢AI医学影像问答</title>
    <style>
      :root {
        --bg: #050505;
        --sidebar: #0b0b0b;
        --panel: #0f0f0f;
        --panel-soft: #161616;
        --text: #efefef;
        --muted: #9a9a9a;
        --primary: #3f3f3f;
        --border: #2a2a2a;
        --warn: #ff7a7a;
        --ok: #5dd39e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        padding: 14px 12px;
      }
      .brand {
        font-size: 18px;
        font-weight: 700;
        margin: 4px 0 12px;
      }
      .new-chat {
        width: 100%;
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 11px 12px;
        margin-bottom: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .visit-title {
        margin: 4px 4px 10px;
        font-size: 13px;
        color: var(--muted);
      }
      .visit-item {
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
        background: var(--panel-soft);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
        text-align: left;
        cursor: pointer;
      }
      .visit-item.active {
        border-color: #565656;
      }
      .main {
        padding: 16px 18px;
        display: block;
        min-height: 100vh;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        margin: 12px;
        position: relative;
        overflow: hidden;
      }
      .content, .composer {
        background: transparent;
        border: 0;
        border-radius: 0;
      }
      .content {
        padding: 8px 8px 220px;
        display: grid;
        grid-template-rows: 1fr;
        min-height: calc(100vh - 70px);
      }
      .hello {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }
      .hello-card {
        text-align: center;
        max-width: 760px;
        padding: 14px 24px 30px;
      }
      .hello-card h1 {
        margin: 0;
        font-size: 44px;
        letter-spacing: 0.5px;
      }
      .hello-card p {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.7;
      }
      .chat {
        display: none;
        height: calc(100vh - 250px);
        overflow-y: auto;
        padding-right: 4px;
      }
      .chat.show { display: block; }
      .msg {
        max-width: 82%;
        margin: 10px 0;
        border-radius: 12px;
        padding: 10px 12px;
        line-height: 1.6;
      }
      .msg.ai { background: var(--panel-soft); border: 1px solid #2d2d2d; }
      .msg.user { margin-left: auto; background: #2a2a2a; }
      .composer {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: min(860px, calc(100% - 44px));
        bottom: 18px;
        padding: 8px;
        background: rgba(12, 12, 12, 0.88);
        backdrop-filter: blur(6px);
        border: 1px solid #2f2f2f;
        border-radius: 16px;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.34);
      }
      .composer::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 10px;
        right: 10px;
        border-top: 1px solid rgba(160, 160, 160, 0.25);
      }
      .composer-box {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111111;
        padding: 8px;
      }
      textarea, input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        background: #121212;
        color: var(--text);
      }
      .composer-box textarea {
        border: 0;
        background: transparent;
        min-height: 52px;
        padding: 0;
        font-size: 17px;
      }
      .composer-box textarea:focus { outline: none; }
      .composer-footer {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid #272727;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .file-inline {
        display: none;
      }
      .actions { margin-left: auto; display: flex; gap: 8px; }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        transition: box-shadow 0.18s ease, border-color 0.18s ease, transform 0.08s ease;
      }
      button:hover {
        border-color: rgba(126, 162, 255, 0.55);
        box-shadow:
          0 0 0 1px rgba(126, 162, 255, 0.2),
          0 0 8px rgba(126, 162, 255, 0.18);
      }
      button:active {
        border-color: #7ea2ff;
        box-shadow:
          0 0 0 1px rgba(126, 162, 255, 0.45),
          0 0 10px rgba(126, 162, 255, 0.35),
          0 0 22px rgba(126, 162, 255, 0.2);
        transform: translateY(0.5px) scale(0.995);
      }
      .primary { background: var(--primary); color: #fff; font-weight: 700; }
      .ghost { background: #121212; border-color: var(--border); color: var(--text); }
      .icon-btn {
        width: 34px;
        height: 34px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #121212;
        color: var(--text);
        font-size: 18px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .send-arrow {
        width: 42px;
        height: 34px;
        padding: 0;
        border-radius: 8px;
        font-size: 18px;
        line-height: 1;
      }
      .status { margin-top: 8px; color: var(--muted); font-size: 13px; }
      .high { color: var(--warn); font-weight: 700; }
      .low { color: var(--ok); font-weight: 700; }
      .heatmap { margin-top: 8px; max-width: 320px; border-radius: 10px; border: 1px solid var(--border); }
      .img-compare {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 10px;
      }
      .img-card {
        background: #151515;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
      }
      .img-card .cap {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .img-card img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #3a3a3a;
        object-fit: contain;
        max-height: 280px;
        background: #0f0f0f;
      }
      .route-float {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 132px;
        z-index: 80;
      }
      .route-panel {
        display: inline-flex;
        gap: 8px;
        background: rgba(17, 17, 17, 0.92);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px;
      }
      .route-opt {
        width: auto;
        margin-top: 0;
        background: #1b1b1b;
        color: var(--text);
        border: 1px solid #343434;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 12px;
        text-align: center;
      }
      .route-opt.active {
        border-color: #5a5a5a;
        background: #303030;
      }
      @media (max-width: 920px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
        .chat { height: 50vh; }
        .main {
          margin: 0;
          border-radius: 0;
        }
        .composer {
          width: calc(100% - 20px);
          bottom: 10px;
        }
        .route-float { bottom: 116px; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">灵枢AI</div>
        <button class="new-chat" onclick="startNewChat()">+ 新对话</button>
        <div class="visit-title">访问记录</div>
        <div id="visitList"></div>
      </aside>

      <section class="main">
        <div class="content">
          <div class="hello" id="helloBox">
            <div class="hello-card">
              <h1>你好，我是灵枢AI</h1>
              <p>可以向我描述症状，或上传骨骼 X 线/DR 做辅助分析。<br />我会给出风险提示、主要类别以及可解释热图。</p>
            </div>
          </div>
          <div class="chat" id="chatBox">
            <div class="msg ai">你好，请告诉我你最近的症状或就诊疑问。</div>
          </div>
        </div>

        <div class="composer">
          <div class="composer-box">
            <textarea id="questionInput" placeholder="给灵枢AI发送消息"></textarea>
            <div class="composer-footer">
              <div class="file-inline">
                <input id="imageFile" type="file" accept="image/*" />
              </div>
              <div class="actions">
                <button class="icon-btn" onclick="openImagePicker()" title="选择文件">+</button>
                <button class="primary send-arrow" onclick="sendQuestion()" title="发送">→</button>
              </div>
            </div>
          </div>
          <div id="statusText" class="status">请输入消息开始对话。</div>
        </div>
        <div class="route-float">
          <div id="routePanel" class="route-panel">
            <button id="routeAutoBtn" class="route-opt" onclick="setRouteMode('auto')">自动路由</button>
            <button id="routeBoneBtn" class="route-opt" onclick="setRouteMode('force_bone')">骨骼优先</button>
            <button id="routePostureBtn" class="route-opt" onclick="setRouteMode('force_posture')">坐姿优先</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const visits = [
        { id: "v1", title: "最近对话 1", preview: "今天 09:20" },
        { id: "v2", title: "最近对话 2", preview: "昨天 21:14" },
      ];
      let activeVisitId = visits[0].id;

      function renderVisits() {
        const box = document.getElementById("visitList");
        box.innerHTML = "";
        visits.forEach((item) => {
          const btn = document.createElement("button");
          btn.className = "visit-item" + (item.id === activeVisitId ? " active" : "");
          btn.innerHTML = `<strong>${item.title}</strong><div style="font-size:12px;color:var(--muted);margin-top:3px;">${item.preview}</div>`;
          btn.onclick = () => {
            activeVisitId = item.id;
            renderVisits();
          };
          box.appendChild(btn);
        });
      }

      function showChatPanel() {
        document.getElementById("helloBox").style.display = "none";
        document.getElementById("chatBox").classList.add("show");
      }

      function addUser(text) {
        showChatPanel();
        const node = document.createElement("div");
        node.className = "msg user";
        node.textContent = text;
        const box = document.getElementById("chatBox");
        box.appendChild(node);
        box.scrollTop = box.scrollHeight;
      }

      function addAi(text, isHtml = false) {
        showChatPanel();
        const node = document.createElement("div");
        node.className = "msg ai";
        if (isHtml) node.innerHTML = text;
        else node.textContent = text;
        const box = document.getElementById("chatBox");
        box.appendChild(node);
        box.scrollTop = box.scrollHeight;
      }

      function buildImageCompareHtml(file, heatmapPath) {
        const safeHeatmap = (heatmapPath || "").replaceAll("\\\\", "/");
        const now = Date.now();
        let html = `<div class="img-compare">`;
        if (file) {
          const localSrc = URL.createObjectURL(file);
          html += `<div class="img-card"><div class="cap">上传原图</div><img src="${localSrc}" alt="上传原图" /></div>`;
        }
        if (safeHeatmap) {
          html += `<div class="img-card"><div class="cap">模型热图</div><img src="${safeHeatmap}?t=${now}" alt="模型热图" /></div>`;
        }
        html += `</div>`;
        return html;
      }

      function getApiBaseUrl() {
        const params = new URLSearchParams(window.location.search);
        const urlApi = params.get("api");
        if (urlApi && urlApi.trim()) {
          const normalized = urlApi.trim().replace(/\/+$/, "");
          localStorage.setItem("medfuse_api_base_url", normalized);
          return normalized;
        }
        const localApi = localStorage.getItem("medfuse_api_base_url");
        if (localApi && localApi.trim()) {
          return localApi.trim().replace(/\/+$/, "");
        }
        return "http://127.0.0.1:8000";
      }

      function getApiKey() {
        return localStorage.getItem("medfuse_api_key") || "demo-key";
      }

      function openImagePicker() {
        document.getElementById("imageFile").click();
      }

      /** 统一提取 FastAPI（detail）与业务字段（错误）中的可读说明 */
      function formatApiFailureMessage(data, resp) {
        if (data && typeof data.错误 === "string") return data.错误;
        if (data && data.detail !== undefined) {
          const d = data.detail;
          if (Array.isArray(d))
            return d.map((x) => (typeof x === "object" && x.msg != null ? x.msg : String(x))).join("；");
          return String(d);
        }
        if (!resp.ok)
          return "HTTP " + resp.status + (resp.statusText ? " " + resp.statusText : "");
        return "分析失败";
      }

      function enrichNetworkErrorMessage(msg) {
        const s = msg || "";
        if (/Failed to fetch|NetworkError|load failed|network error/i.test(s))
          return (
            s +
            "（常见原因：推理服务未启动、API 地址错误（当前 " +
            getApiBaseUrl() +
            "）、或 HTTPS 页面请求 HTTP 接口被浏览器拦截。可在 URL 加 ?api=你的服务根地址 或写入 localStorage medfuse_api_base_url）"
          );
        return s;
      }

      function getRouteMode() {
        const mode = localStorage.getItem("medfuse_route_mode");
        if (!mode) return "auto";
        if (mode === "force_bone" || mode === "force_posture" || mode === "auto") return mode;
        return "auto";
      }

      function applyRouteModeButtons() {
        const mode = getRouteMode();
        document.getElementById("routeAutoBtn").classList.toggle("active", mode === "auto");
        document.getElementById("routeBoneBtn").classList.toggle("active", mode === "force_bone");
        document.getElementById("routePostureBtn").classList.toggle("active", mode === "force_posture");
      }

      function setRouteMode(mode) {
        localStorage.setItem("medfuse_route_mode", mode);
        applyRouteModeButtons();
        const textMap = {
          auto: "自动路由",
          force_bone: "骨骼优先",
          force_posture: "坐姿优先",
        };
        document.getElementById("statusText").textContent = "已切换路由模式：" + (textMap[mode] || "自动路由");
      }

      async function sendQuestion() {
        const question = document.getElementById("questionInput").value.trim();
        const file = document.getElementById("imageFile").files[0];
        const statusEl = document.getElementById("statusText");
        if (!question) {
          statusEl.textContent = "请输入内容后再发送。";
          return;
        }
        addUser(question);
        document.getElementById("questionInput").value = "";
        visits.unshift({
          id: "v" + Date.now(),
          title: "新对话",
          preview: "刚刚",
        });
        activeVisitId = visits[0].id;
        renderVisits();

        const fd = new FormData();
        if (file) fd.append("image_file", file);
        fd.append("text", question);
        fd.append("struct_features", "0.52,1,0,0,1,0");
        fd.append("route_mode", getRouteMode());
        statusEl.textContent = "正在自动路由并分析...";

        try {
          const resp = await fetch(getApiBaseUrl() + "/route_infer", {
            method: "POST",
            headers: { "X-API-Key": getApiKey() },
            body: fd,
          });
          const raw = await resp.text();
          let data = {};
          try {
            data = raw ? JSON.parse(raw) : {};
          } catch {
            throw new Error(
              "服务器返回非 JSON（HTTP " +
                resp.status +
                "）。请确认访问的是 FastAPI 根地址而非静态页，且服务已启动。"
            );
          }
          if (!resp.ok || data.错误)
            throw new Error(formatApiFailureMessage(data, resp));

          let html = `<div>自动路由：${data.route_module || "未知"}（置信度：${data.route_confidence ?? "N/A"}）</div>`;
          if (data.route_mode_used) {
            const modeMap = {
              auto: "自动路由",
              force_bone: "骨骼优先",
              force_posture: "坐姿优先",
            };
            html += `<div>路由模式：${modeMap[data.route_mode_used] || data.route_mode_used}</div>`;
          }
          if (data.route_reason) html += `<div>路由原因：${data.route_reason}</div>`;

          const result = data.result || {};
          if (result.行为风险分数) {
            const scores = result.行为风险分数 || {};
            const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0] || ["未知", 0];
            html += `<div>坐姿模块：${result.说明 || "占位模块返回"}</div>`;
            html += `<div>主要行为维度：${top[0]}</div><div>风险分数：${Number(top[1]).toFixed(4)}</div>`;
          } else {
            const scores = result.风险分数 || {};
            const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0] || ["未知", 0];
            const score = Number(top[1]);
            html += `<div class="${score >= 0.5 ? "high" : "low"}">风险提示：${score >= 0.5 ? "较高风险" : "较低风险"}</div>`;
            html += `<div>主要类别：${top[0]}</div><div>风险分数：${score.toFixed(4)}</div>`;
            if (result.热图路径) {
              html += buildImageCompareHtml(file, result.热图路径);
              html += `<div>热图解释：颜色更亮的区域代表模型关注更高，可与原图对照查看可疑区域；该结果仅作辅助参考。</div>`;
            } else if (file) {
              html += `<div>已上传影像，但当前返回未包含热图路径，请检查后端是否启用热图产出。</div>`;
            }
            if (result.说明) html += `<div>${result.说明}</div>`;
          }
          addAi(html, true);
          statusEl.textContent = "分析完成。";
        } catch (e) {
          const msg = enrichNetworkErrorMessage(e.message || String(e));
          addAi("调用失败：" + msg);
          statusEl.textContent = "调用失败，请查看上方具体原因。";
        }
      }

      function startNewChat() {
        document.getElementById("helloBox").style.display = "flex";
        document.getElementById("chatBox").classList.remove("show");
        document.getElementById("chatBox").innerHTML = '<div class="msg ai">对话已清空，请重新开始提问。</div>';
        document.getElementById("questionInput").value = "";
        document.getElementById("imageFile").value = "";
        document.getElementById("statusText").textContent = "请输入消息开始对话。";
      }

      renderVisits();
      applyRouteModeButtons();
    </script>
  </body>
</html>
