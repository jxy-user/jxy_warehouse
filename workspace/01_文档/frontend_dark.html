<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵枢AI医学影像辅助诊断系统</title>
    <style>
      :root {
        --bg: #090d18;
        --sidebar: #0c1222;
        --panel: #12182a;
        --panel-soft: #1a2238;
        --text: #e9edff;
        --muted: #9fa9cf;
        --primary: #5c8dff;
        --border: #2a3558;
        --warn: #f37f7f;
        --ok: #35c292;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top, #131d36 0%, var(--bg) 45%);
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        padding: 14px;
      }
      .brand { font-size: 20px; font-weight: 700; margin: 4px 0 14px; }
      .cat-item {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
        text-align: left;
        cursor: pointer;
      }
      .cat-item.active {
        background: var(--panel-soft);
        border-color: #4d67b8;
      }
      .main {
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }
      .head, .chat, .composer {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
      }
      .head { padding: 12px 14px; }
      .head h1 { margin: 0; font-size: 22px; }
      .head p { margin: 6px 0 0; color: var(--muted); }
      .chat {
        padding: 12px;
        max-height: calc(100vh - 240px);
        overflow-y: auto;
      }
      .msg {
        max-width: 88%;
        margin: 8px 0;
        border-radius: 12px;
        padding: 9px 11px;
        line-height: 1.6;
      }
      .msg.ai { background: var(--panel-soft); border: 1px solid #2e3c66; }
      .msg.user { margin-left: auto; background: #203a7b; }
      .composer { padding: 12px; }
      label { display: block; color: var(--muted); margin-bottom: 6px; font-size: 13px; }
      input, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0d1429;
        color: var(--text);
        padding: 10px;
      }
      .composer-box {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #0d1429;
        padding: 10px;
      }
      .composer-box textarea {
        border: 0;
        background: transparent;
        min-height: 82px;
        padding: 0;
      }
      .composer-box textarea:focus { outline: none; }
      .composer-footer {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #243056;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .file-inline {
        flex: 1;
        min-width: 180px;
      }
      .file-inline input {
        font-size: 12px;
        padding: 6px;
      }
      .actions { margin-left: auto; display: flex; gap: 8px; }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .primary { background: var(--primary); color: #fff; font-weight: 700; }
      .ghost { background: transparent; border-color: var(--border); color: var(--text); }
      .status { margin-top: 8px; color: var(--muted); font-size: 13px; }
      .high { color: var(--warn); font-weight: 700; }
      .low { color: var(--ok); font-weight: 700; }
      .heatmap { margin-top: 8px; max-width: 320px; border-radius: 10px; border: 1px solid var(--border); }
      @media (max-width: 920px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">AI问诊助手</div>
        <div id="categoryList"></div>
      </aside>

      <section class="main">
        <div class="head">
          <h1 id="catTitle">呼吸系统问诊</h1>
          <p>左侧选择问诊分类，右侧进行问答。可选上传胸片进行辅助分析。</p>
        </div>

        <div class="chat" id="chatBox">
          <div class="msg ai">你好，我是AI问诊助手。请先描述你的症状，例如咳嗽、发热、胸闷等。</div>
        </div>

        <div class="composer">
          <div class="composer-box">
            <textarea id="questionInput" placeholder="请输入你的问题，例如：咳嗽三天，夜间加重，需要做什么检查？"></textarea>
            <div class="composer-footer">
              <div class="file-inline">
                <label for="imageFile">附件（可选）</label>
                <input id="imageFile" type="file" accept="image/*" />
              </div>
              <div class="actions">
                <button class="primary" onclick="sendQuestion()">发送问题</button>
                <button class="ghost" onclick="clearChat()">清空</button>
              </div>
            </div>
          </div>
          <div id="statusText" class="status">请选择左侧分类并输入问题。</div>
        </div>
      </section>
    </div>

    <script>
      const categories = [
        "呼吸系统问诊",
        "发热与感染",
        "慢性病随访",
        "影像检查咨询",
        "用药与过敏",
        "术后与康复",
      ];
      let currentCategory = categories[0];
      let chatCategory = currentCategory;

      function renderCategories() {
        const box = document.getElementById("categoryList");
        box.innerHTML = "";
        categories.forEach((name) => {
          const btn = document.createElement("button");
          btn.className = "cat-item" + (name === currentCategory ? " active" : "");
          btn.textContent = name;
          btn.onclick = () => {
            currentCategory = name;
            document.getElementById("catTitle").textContent = name;
            renderCategories();
            resetChatForCategory(name);
          };
          box.appendChild(btn);
        });
      }

      function resetChatForCategory(name) {
        const box = document.getElementById("chatBox");
        box.innerHTML = `<div class="msg ai">当前分类：${name}。请直接描述你的症状或问题。</div>`;
        document.getElementById("statusText").textContent = `已切换到${name}，请输入问题。`;
        chatCategory = name;
      }

      function addUser(text) {
        const node = document.createElement("div");
        node.className = "msg user";
        node.textContent = text;
        const box = document.getElementById("chatBox");
        box.appendChild(node);
        box.scrollTop = box.scrollHeight;
      }

      function addAi(text, isHtml = false) {
        const node = document.createElement("div");
        node.className = "msg ai";
        if (isHtml) node.innerHTML = text;
        else node.textContent = text;
        const box = document.getElementById("chatBox");
        box.appendChild(node);
        box.scrollTop = box.scrollHeight;
      }

      function getApiBaseUrl() {
        return "http://127.0.0.1:8000";
      }

      function getApiKey() {
        return localStorage.getItem("medfuse_api_key") || "demo-key";
      }

      async function sendQuestion() {
        const question = document.getElementById("questionInput").value.trim();
        const file = document.getElementById("imageFile").files[0];
        const statusEl = document.getElementById("statusText");
        if (!question) {
          statusEl.textContent = "请输入问题后再发送。";
          return;
        }
        if (chatCategory !== currentCategory) {
          resetChatForCategory(currentCategory);
        }
        addUser(question);
        document.getElementById("questionInput").value = "";

        if (!file) {
          addAi("已收到你的问题。若出现持续高热、呼吸困难、胸痛等症状，请及时线下就医。");
          statusEl.textContent = "已回复。";
          return;
        }

        const fd = new FormData();
        fd.append("image_file", file);
        fd.append("text", question);
        fd.append("struct_features", "0.52,1,0,0,1,0");
        statusEl.textContent = "正在进行影像辅助分析...";

        try {
          const resp = await fetch(getApiBaseUrl() + "/infer_with_image", {
            method: "POST",
            headers: { "X-API-Key": getApiKey() },
            body: fd,
          });
          const data = await resp.json();
          if (!resp.ok || data.错误) throw new Error(data.错误 || "分析失败");

          const scores = data.风险分数 || {};
          const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0] || ["未知", 0];
          const score = Number(top[1]);
          let html = `<div class="${score >= 0.5 ? "high" : "low"}">风险提示：${score >= 0.5 ? "较高风险" : "较低风险"}</div>`;
          html += `<div>主要类别：${top[0]}</div><div>风险分数：${score.toFixed(4)}</div>`;
          if (data.热图路径) {
            html += `<img class="heatmap" src="${data.热图路径.replaceAll("\\\\", "/")}?t=${Date.now()}" alt="热图" />`;
          }
          addAi(html, true);
          statusEl.textContent = "分析完成。";
        } catch (e) {
          addAi("调用失败：" + e.message);
          statusEl.textContent = "调用失败。";
        }
      }

      function clearChat() {
        document.getElementById("chatBox").innerHTML = '<div class="msg ai">对话已清空，请重新开始提问。</div>';
        document.getElementById("imageFile").value = "";
        document.getElementById("statusText").textContent = "请选择左侧分类并输入问题。";
      }

      renderCategories();
      resetChatForCategory(currentCategory);
    </script>
  </body>
</html>
