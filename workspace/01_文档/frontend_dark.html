<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵枢AI医学影像问答</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --sidebar: #eef2f9;
        --panel: #ffffff;
        --panel-soft: #f7f9ff;
        --text: #1d2333;
        --muted: #6a748f;
        --primary: #4e6ef2;
        --border: #dbe3f1;
        --warn: #d35454;
        --ok: #1f9a6e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        padding: 14px 12px;
      }
      .brand {
        font-size: 18px;
        font-weight: 700;
        margin: 4px 0 12px;
      }
      .new-chat {
        width: 100%;
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 11px 12px;
        margin-bottom: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .visit-title {
        margin: 4px 4px 10px;
        font-size: 13px;
        color: var(--muted);
      }
      .visit-item {
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
        background: var(--panel-soft);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
        text-align: left;
        cursor: pointer;
      }
      .visit-item.active {
        border-color: #b8c7ef;
      }
      .main {
        padding: 20px;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 14px;
        min-height: 100vh;
      }
      .content, .composer {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
      }
      .content {
        padding: 16px;
        display: grid;
        grid-template-rows: 1fr;
      }
      .hello {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }
      .hello-card {
        text-align: center;
        max-width: 620px;
        padding: 28px 24px;
      }
      .hello-card h1 {
        margin: 0;
        font-size: 32px;
      }
      .hello-card p {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.7;
      }
      .chat {
        display: none;
        height: calc(100vh - 250px);
        overflow-y: auto;
        padding-right: 4px;
      }
      .chat.show { display: block; }
      .msg {
        max-width: 82%;
        margin: 10px 0;
        border-radius: 12px;
        padding: 10px 12px;
        line-height: 1.6;
      }
      .msg.ai { background: var(--panel-soft); border: 1px solid #e4ebfb; }
      .msg.user { margin-left: auto; background: #dfe7ff; }
      .composer { padding: 12px; }
      .composer-box {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        padding: 10px;
      }
      textarea, input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        color: var(--text);
      }
      .composer-box textarea {
        border: 0;
        background: transparent;
        min-height: 62px;
        padding: 0;
      }
      .composer-box textarea:focus { outline: none; }
      .composer-footer {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #e9eef8;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .file-inline {
        flex: 0 0 200px;
        min-width: 180px;
      }
      .file-inline input {
        font-size: 12px;
        padding: 7px;
      }
      .actions { margin-left: auto; display: flex; gap: 8px; }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .primary { background: var(--primary); color: #fff; font-weight: 700; }
      .ghost { background: #fff; border-color: var(--border); color: var(--text); }
      .status { margin-top: 8px; color: var(--muted); font-size: 13px; }
      .high { color: var(--warn); font-weight: 700; }
      .low { color: var(--ok); font-weight: 700; }
      .heatmap { margin-top: 8px; max-width: 320px; border-radius: 10px; border: 1px solid var(--border); }
      @media (max-width: 920px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
        .chat { height: 50vh; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">灵枢AI</div>
        <button class="new-chat" onclick="startNewChat()">+ 新对话</button>
        <div class="visit-title">访问记录</div>
        <div id="visitList"></div>
      </aside>

      <section class="main">
        <div class="content">
          <div class="hello" id="helloBox">
            <div class="hello-card">
              <h1>你好，我是灵枢AI</h1>
              <p>可以向我描述症状，或上传胸片做辅助分析。<br />我会给出风险提示、主要类别以及可解释热图。</p>
            </div>
          </div>
          <div class="chat" id="chatBox">
            <div class="msg ai">你好，请告诉我你最近的症状或就诊疑问。</div>
          </div>
        </div>

        <div class="composer">
          <div class="composer-box">
            <textarea id="questionInput" placeholder="给灵枢AI发送消息"></textarea>
            <div class="composer-footer">
              <div class="file-inline">
                <input id="imageFile" type="file" accept="image/*" />
              </div>
              <div class="actions">
                <button class="primary" onclick="sendQuestion()">发送问题</button>
                <button class="ghost" onclick="startNewChat()">新对话</button>
              </div>
            </div>
          </div>
          <div id="statusText" class="status">请输入消息开始对话。</div>
        </div>
      </section>
    </div>

    <script>
      const visits = [
        { id: "v1", title: "最近对话 1", preview: "今天 09:20" },
        { id: "v2", title: "最近对话 2", preview: "昨天 21:14" },
      ];
      let activeVisitId = visits[0].id;

      function renderVisits() {
        const box = document.getElementById("visitList");
        box.innerHTML = "";
        visits.forEach((item) => {
          const btn = document.createElement("button");
          btn.className = "visit-item" + (item.id === activeVisitId ? " active" : "");
          btn.innerHTML = `<strong>${item.title}</strong><div style="font-size:12px;color:var(--muted);margin-top:3px;">${item.preview}</div>`;
          btn.onclick = () => {
            activeVisitId = item.id;
            renderVisits();
          };
          box.appendChild(btn);
        });
      }

      function showChatPanel() {
        document.getElementById("helloBox").style.display = "none";
        document.getElementById("chatBox").classList.add("show");
      }

      function addUser(text) {
        showChatPanel();
        const node = document.createElement("div");
        node.className = "msg user";
        node.textContent = text;
        const box = document.getElementById("chatBox");
        box.appendChild(node);
        box.scrollTop = box.scrollHeight;
      }

      function addAi(text, isHtml = false) {
        showChatPanel();
        const node = document.createElement("div");
        node.className = "msg ai";
        if (isHtml) node.innerHTML = text;
        else node.textContent = text;
        const box = document.getElementById("chatBox");
        box.appendChild(node);
        box.scrollTop = box.scrollHeight;
      }

      function getApiBaseUrl() {
        const params = new URLSearchParams(window.location.search);
        const urlApi = params.get("api");
        if (urlApi && urlApi.trim()) {
          const normalized = urlApi.trim().replace(/\/+$/, "");
          localStorage.setItem("medfuse_api_base_url", normalized);
          return normalized;
        }
        const localApi = localStorage.getItem("medfuse_api_base_url");
        if (localApi && localApi.trim()) {
          return localApi.trim().replace(/\/+$/, "");
        }
        return "http://127.0.0.1:8000";
      }

      function getApiKey() {
        return localStorage.getItem("medfuse_api_key") || "demo-key";
      }

      async function sendQuestion() {
        const question = document.getElementById("questionInput").value.trim();
        const file = document.getElementById("imageFile").files[0];
        const statusEl = document.getElementById("statusText");
        if (!question) {
          statusEl.textContent = "请输入内容后再发送。";
          return;
        }
        addUser(question);
        document.getElementById("questionInput").value = "";
        visits.unshift({
          id: "v" + Date.now(),
          title: "新对话",
          preview: "刚刚",
        });
        activeVisitId = visits[0].id;
        renderVisits();

        if (!file) {
          addAi("已收到你的问题。若出现持续高热、呼吸困难、胸痛等症状，请及时线下就医。");
          statusEl.textContent = "已回复。";
          return;
        }

        const fd = new FormData();
        fd.append("image_file", file);
        fd.append("text", question);
        fd.append("struct_features", "0.52,1,0,0,1,0");
        statusEl.textContent = "正在进行影像辅助分析...";

        try {
          const resp = await fetch(getApiBaseUrl() + "/infer_with_image", {
            method: "POST",
            headers: { "X-API-Key": getApiKey() },
            body: fd,
          });
          const data = await resp.json();
          if (!resp.ok || data.错误) throw new Error(data.错误 || "分析失败");

          const scores = data.风险分数 || {};
          const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0] || ["未知", 0];
          const score = Number(top[1]);
          let html = `<div class="${score >= 0.5 ? "high" : "low"}">风险提示：${score >= 0.5 ? "较高风险" : "较低风险"}</div>`;
          html += `<div>主要类别：${top[0]}</div><div>风险分数：${score.toFixed(4)}</div>`;
          if (data.热图路径) {
            html += `<img class="heatmap" src="${data.热图路径.replaceAll("\\\\", "/")}?t=${Date.now()}" alt="热图" />`;
          }
          addAi(html, true);
          statusEl.textContent = "分析完成。";
        } catch (e) {
          addAi("调用失败：" + e.message);
          statusEl.textContent = "调用失败。";
        }
      }

      function startNewChat() {
        document.getElementById("helloBox").style.display = "flex";
        document.getElementById("chatBox").classList.remove("show");
        document.getElementById("chatBox").innerHTML = '<div class="msg ai">对话已清空，请重新开始提问。</div>';
        document.getElementById("questionInput").value = "";
        document.getElementById("imageFile").value = "";
        document.getElementById("statusText").textContent = "请输入消息开始对话。";
      }

      renderVisits();
    </script>
  </body>
</html>
