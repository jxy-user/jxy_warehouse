<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>胸片简易分析</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a2f;
        --text: #e8ecff;
        --muted: #9aa7d6;
        --primary: #5b8cff;
        --success: #31c48d;
        --danger: #f87171;
        --border: #2a355d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        width: min(680px, 92vw);
        margin: 24px auto 40px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }
      h1 { margin: 0; font-size: 24px; }
      p { color: var(--muted); line-height: 1.7; }
      label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 14px; }
      input, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0d1429;
        color: var(--text);
        padding: 10px 12px;
      }
      textarea { min-height: 70px; resize: vertical; }
      .btns { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary { background: var(--primary); color: #fff; }
      .ghost { background: transparent; border-color: var(--border); color: var(--text); }
      .status { margin-top: 10px; color: var(--muted); font-size: 14px; }
      .result { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
      .risk-high { color: var(--danger); font-weight: 700; }
      .risk-low { color: var(--success); font-weight: 700; }
      .preview {
        margin-top: 10px;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>胸片简易分析</h1>
        <p>上传一张胸片，系统会给出风险提示。此结果仅供参考，不能代替医生诊断。</p>

        <label for="apiBaseUrl">接口地址（默认不用改）</label>
        <input id="apiBaseUrl" type="text" value="http://127.0.0.1:8000" />

        <label for="imageFile">胸片图片（必填）</label>
        <input id="imageFile" type="file" accept="image/*" />

        <label for="textInput">症状描述（可选）</label>
        <textarea id="textInput" placeholder="例如：咳嗽、发热3天"></textarea>

        <div class="btns">
          <button class="primary" onclick="submitInfer()">开始分析</button>
          <button class="ghost" onclick="pingHealth()">检测服务</button>
          <button class="ghost" onclick="resetForm()">清空</button>
        </div>
        <div class="status" id="statusText">请先上传图片后点击“开始分析”。</div>

        <div class="result" id="resultBox" style="display:none;">
          <div id="riskLevel"></div>
          <div id="topClass" class="status"></div>
          <div id="topScore" class="status"></div>
          <img id="heatmapPreview" class="preview" alt="热图预览" style="display:none;" />
        </div>
      </div>
    </div>

    <script>
      function getApiBaseUrl() {
        return (document.getElementById("apiBaseUrl").value || "").trim().replace(/\/+$/, "") || "http://127.0.0.1:8000";
      }

      async function pingHealth() {
        const base = getApiBaseUrl();
        const statusEl = document.getElementById("statusText");
        try {
          const resp = await fetch(base + "/health");
          if (!resp.ok) throw new Error("服务异常");
          statusEl.textContent = "服务正常，可开始分析。";
        } catch (_e) {
          statusEl.textContent = "服务不可用，请确认接口地址或后端是否启动。";
        }
      }

      async function submitInfer() {
        const fileInput = document.getElementById("imageFile");
        const textInput = document.getElementById("textInput");
        const statusEl = document.getElementById("statusText");
        const resultBox = document.getElementById("resultBox");
        const riskLevel = document.getElementById("riskLevel");
        const topClass = document.getElementById("topClass");
        const topScore = document.getElementById("topScore");
        const preview = document.getElementById("heatmapPreview");
        const base = getApiBaseUrl();

        if (!fileInput.files || fileInput.files.length === 0) {
          statusEl.textContent = "请先选择胸片图片。";
          return;
        }

        const fd = new FormData();
        fd.append("image_file", fileInput.files[0]);
        fd.append("text", textInput.value || "");
        fd.append("struct_features", "0.52,1,0,0,1,0");

        statusEl.textContent = "正在分析，请稍候...";
        resultBox.style.display = "none";
        preview.style.display = "none";

        try {
          const resp = await fetch(base + "/infer_with_image", { method: "POST", body: fd });
          const data = await resp.json();
          if (!resp.ok || data.错误) throw new Error(data.错误 || "分析失败");

          const scores = data.风险分数 || {};
          const entries = Object.entries(scores).sort((a, b) => b[1] - a[1]);
          const best = entries[0] || ["未知", 0];
          const level = Number(best[1]) >= 0.5 ? "较高风险" : "较低风险";

          riskLevel.className = Number(best[1]) >= 0.5 ? "risk-high" : "risk-low";
          riskLevel.textContent = "风险提示：" + level;
          topClass.textContent = "主要类别：" + best[0];
          topScore.textContent = "风险分数：" + Number(best[1]).toFixed(4);

          if (data.热图路径) {
            preview.src = data.热图路径.replaceAll("\\\\", "/") + `?t=${Date.now()}`;
            preview.style.display = "block";
          }

          resultBox.style.display = "block";
          statusEl.textContent = "分析完成。请结合医生意见判断。";
        } catch (e) {
          statusEl.textContent = "调用失败：" + e.message;
        }
      }

      function resetForm() {
        document.getElementById("imageFile").value = "";
        document.getElementById("textInput").value = "";
        document.getElementById("statusText").textContent = "请先上传图片后点击“开始分析”。";
        document.getElementById("resultBox").style.display = "none";
      }
    </script>
  </body>
</html>
