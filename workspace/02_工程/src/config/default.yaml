# 灵枢AI — 全局配置（任务差异见 active_module 对应 modules/*.yaml）
# 切换任务：只改 active_module，并为新任务准备独立 CSV 与 checkpoint（见 modules/README.md）

active_module: bone   # bone | chest_mvp | 自定义模块文件名（不含 .yaml）

seed: 42
device: cpu

data:
  mode: mock   # mock | csv；各类别数、csv_path 由模块覆盖
  num_samples: 120
  image_size: 224
  num_struct_features: 6
  train_split: 0.8
  image_root: ../03_数据/data/images

model:
  image_in_channels: 1
  image_embed_dim: 128
  text_vocab_size: 1000
  text_embed_dim: 128
  text_max_len: 32
  struct_hidden_dim: 64
  fusion_dim: 128

train:
  batch_size: 8
  epochs: 2
  lr: 0.0005
  weight_decay: 0.0001

infer:
  heatmap_dir: ../03_数据/outputs/heatmaps

security:
  enabled: true
  rate_limit_per_minute: 60
  public_health: true

cors:
  allow_origins:
    - "http://127.0.0.1:8000"
    - "http://localhost:8000"
    - "https://jxy-user.github.io"
  allow_credentials: true
  allow_methods:
    - "*"
  allow_headers:
    - "*"
